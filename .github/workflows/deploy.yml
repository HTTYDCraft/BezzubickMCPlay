name: Deploy Publish Site

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v1
        with:
          swift-version: "5.9"

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build and generate site
        run: swift run BezzubickMCPlay

      - name: Copy links page to output
        run: cp -R links/ Output/links/

      - name: Copy data files to output
        run: |
          cp data.json Output/data.json 2>/dev/null || true
          cp streams_history.json Output/streams_history.json 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: './Output'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v2
