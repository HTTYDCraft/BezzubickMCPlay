name: Deploy Site + WASM

on:
  push:
    branches: [main]
    paths-ignore:
      - 'data.json'
      - 'streams_history.json'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  build-site:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev

      - uses: vapor/swiftly-action@v0.2

      - name: Install Swift 6.3.2
        run: |
          swiftly install 6.3.2
          swiftly use 6.3.2

      - name: Build & generate site
        run: swift run BezzubickMCPlay

      - name: Copy resource files
        run: |
          cp -r Resources/assets Output/assets 2>/dev/null || true
          cp data.json Output/data.json
          cp streams_history.json Output/streams_history.json

      - uses: actions/upload-artifact@v4
        with:
          name: site-output
          path: ./Output

  build-wasm:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev

      - uses: vapor/swiftly-action@v0.2

      - name: Install Swift 6.3.2
        run: |
          swiftly install 6.3.2
          swiftly use 6.3.2

      - name: Install Swift SDK for WASM
        run: |
          swift sdk install \
            "https://download.swift.org/swift-6.3.2-release/wasm-sdk/swift-6.3.2-RELEASE/swift-6.3.2-RELEASE_wasm.artifactbundle.tar.gz" \
            --checksum a61f0584c93283589f8b2f42db05c1f9a182b506c2957271402992655591dd7c

      - name: Build SiteClient WASM
        run: swift build --swift-sdk swift-6.3.2-RELEASE_wasm --target SiteClient -c release

      - name: Manual WASM link
        run: |
          BIN_DIR=$(swift build --swift-sdk swift-6.3.2-RELEASE_wasm -c release --show-bin-path 2>/dev/null)
          echo "=== bin dir: $BIN_DIR ==="
          # Try to link manually — SwiftPM on ARM64 skips linking step
          WASM_LD=$(find /home/runner/.local/share/swiftly/toolchains -name wasm-ld -type f 2>/dev/null | head -1)
          SDK_DIR=$(find ~/.config/swiftpm/swift-sdks -name "WASI.sdk" -type d 2>/dev/null | head -1)
          if [ -z "$WASM_LD" ]; then
            echo "wasm-ld not found, trying alternative locations"
            WASM_LD=$(find / -name wasm-ld -type f 2>/dev/null | head -1)
          fi
          echo "=== wasm-ld: $WASM_LD ==="
          echo "=== SDK: $SDK_DIR ==="
          if [ -n "$WASM_LD" ] && [ -n "$SDK_DIR" ]; then
            TOOLCHAIN=$(dirname $(dirname "$WASM_LD"))
            echo "=== toolchain: $TOOLCHAIN ==="
            mkdir -p /tmp/wasm
            OBJS=$(find "$BIN_DIR" -name "*.o" -type f 2>/dev/null | tr '\n' ' ')
            echo "=== Objects ($(echo $OBJS | wc -w)) ==="
            SWIFT_LIBS=$(find "$TOOLCHAIN/usr/lib/swift_static/wasi" -name "*.a" -type f 2>/dev/null | sort | tr '\n' ' ')
            echo "=== Swift libs ==="
            echo "$SWIFT_LIBS" | tr ' ' '\n'
            "$WASM_LD" \
              --no-entry \
              --export=main \
              --allow-undefined \
              --strip-all \
              $OBJS \
              -L"$SDK_DIR/share/wasi-sysroot/lib/wasm32-wasi" \
              -L"$SDK_DIR/lib/wasi" \
              -lc \
              --whole-archive \
              $SWIFT_LIBS \
              --no-whole-archive \
              -o /tmp/wasm/SiteClient.wasm 2>&1
            ls -lh /tmp/wasm/SiteClient.wasm 2>/dev/null && echo "WASM LINK OK" || echo "WASM LINK FAILED"
          else
            echo "Cannot link — wasm-ld or SDK_DIR missing"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: wasm-output
          path: /tmp/wasm/SiteClient.wasm
          if-no-files-found: ignore

  merge-deploy:
    needs: [build-site, build-wasm]
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: site-output
          path: ./Output

      - name: Download WASM if available
        id: download-wasm
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: wasm-output
          path: ./wasm-artifact

      - name: Merge WASM into site
        run: |
          mkdir -p Output/scripts
          if [ -f ./wasm-artifact/SiteClient.wasm ]; then
            cp ./wasm-artifact/SiteClient.wasm Output/scripts/
            echo "WASM deployed ($(du -h Output/scripts/SiteClient.wasm | cut -f1))"
          else
            echo "No WASM, deploying site only"
          fi

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./Output
