name: Deploy Site + WASM

on:
  push:
    branches: [main]
    paths-ignore:
      - 'data.json'
      - 'streams_history.json'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  build-site:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev

      - uses: vapor/swiftly-action@v0.2

      - name: Install Swift 6.3.2
        run: |
          swiftly install 6.3.2
          swiftly use 6.3.2

      - name: Build & generate site
        run: swift run BezzubickMCPlay

      - name: Copy resource files
        run: |
          cp -r Resources/assets Output/assets 2>/dev/null || true
          cp data.json Output/data.json
          cp streams_history.json Output/streams_history.json

      - uses: actions/upload-artifact@v4
        with:
          name: site-output
          path: ./Output

  build-wasm:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev

      - uses: vapor/swiftly-action@v0.2

      - name: Install Swift 6.3.2
        run: |
          swiftly install 6.3.2
          swiftly use 6.3.2

      - name: Install Swift SDK for WASM
        run: |
          swift sdk install \
            "https://download.swift.org/swift-6.3.2-release/wasm-sdk/swift-6.3.2-RELEASE/swift-6.3.2-RELEASE_wasm.artifactbundle.tar.gz" \
            --checksum a61f0584c93283589f8b2f42db05c1f9a182b506c2957271402992655591dd7c

      - name: Build SiteClient WASM
        run: swift build --swift-sdk swift-6.3.2-RELEASE_wasm --target SiteClient -c release

      - name: Collect WASM binary
        run: |
          BIN_DIR=$(swift build --swift-sdk swift-6.3.2-RELEASE_wasm -c release --show-bin-path 2>/dev/null)
          echo "=== Bin dir: $BIN_DIR ==="
          ls -la "$BIN_DIR/" 2>/dev/null || echo "No bin dir"
          ls -la "$BIN_DIR/SiteClient.build/" 2>/dev/null || echo "No .build dir"
          echo "=== Find executable or wasm files ==="
          find "$BIN_DIR" -type f 2>/dev/null | head -30
          WASM_PATH=$(find "$BIN_DIR" -name "*.wasm" -type f 2>/dev/null | head -1)
          if [ -z "$WASM_PATH" ]; then
            WASM_PATH=$(find "$BIN_DIR" -type f -exec file {} \; 2>/dev/null | grep -i wasm | head -1 | cut -d: -f1)
          fi
          if [ -z "$WASM_PATH" ]; then
            echo "No .wasm found, trying wider search"
            find .build -type f \( -name "*.wasm" -o -name "SiteClient" -o -name "SiteClient.wasm" \) 2>/dev/null | head -10
            WASM_PATH=$(find .build -name "*.wasm" -type f 2>/dev/null | head -1)
          fi
          if [ -n "$WASM_PATH" ]; then
            mkdir -p /tmp/wasm
            cp "$WASM_PATH" /tmp/wasm/SiteClient.wasm
            echo "WASM built: $WASM_PATH ($(du -h /tmp/wasm/SiteClient.wasm | cut -f1))"
          else
            echo "WASM not found, skipping"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: wasm-output
          path: /tmp/wasm/SiteClient.wasm
          if-no-files-found: ignore

  merge-deploy:
    needs: [build-site, build-wasm]
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: site-output
          path: ./Output

      - name: Download WASM if available
        id: download-wasm
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: wasm-output
          path: ./wasm-artifact

      - name: Merge WASM into site
        run: |
          mkdir -p Output/scripts
          if [ -f ./wasm-artifact/SiteClient.wasm ]; then
            cp ./wasm-artifact/SiteClient.wasm Output/scripts/
            echo "WASM deployed ($(du -h Output/scripts/SiteClient.wasm | cut -f1))"
          else
            echo "No WASM, deploying site only"
          fi

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./Output
